name: Windows Build

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      publishRelease:
        description: "Create or update a GitHub Release from this run"
        required: false
        type: boolean
        default: false
      releaseTag:
        description: "Release tag name, defaults to v<package.json version>"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build_windows:
    name: Build Windows Packages
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      release_title: ${{ steps.release.outputs.title }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify version metadata
        run: npm run check:versions

      - name: Type-check frontend
        run: npm run typecheck

      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Build Tauri app
        run: npm run build -- --target x86_64-pc-windows-msvc

      - name: Prepare Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $portableDir = "artifacts/Media-Administrator-$version-windows-x64-portable"
          $installerDir = "artifacts/windows-x64-installer"
          New-Item -ItemType Directory -Force -Path $portableDir, $installerDir | Out-Null

          Copy-Item "src-tauri/target/x86_64-pc-windows-msvc/release/media-administrator.exe" "$portableDir/Media Administrator.exe"
          Compress-Archive -Path "$portableDir/*" -DestinationPath "artifacts/Media-Administrator-$version-windows-x64-portable.zip" -Force

          Copy-Item "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" $installerDir

      - name: Upload Windows portable package
        uses: actions/upload-artifact@v7
        with:
          name: Media-Administrator-windows-x64-portable
          path: artifacts/*portable.zip
          if-no-files-found: error

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: Media-Administrator-windows-x64-installer
          path: artifacts/windows-x64-installer/*.exe
          if-no-files-found: error

      - name: Resolve release metadata
        id: release
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.publishRelease) }}
        shell: pwsh
        env:
          RELEASE_TAG_INPUT: ${{ inputs.releaseTag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ([string]::IsNullOrWhiteSpace($env:RELEASE_TAG_INPUT)) {
              $tag = "v$version"
            } else {
              $tag = $env:RELEASE_TAG_INPUT.Trim()
            }
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          npm run check:versions -- --tag $tag

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "title=Media Administrator $tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  release:
    name: Publish GitHub Release
    needs: build_windows
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.publishRelease) }}
    runs-on: windows-2025-vs2026
    permissions:
      contents: write

    steps:
      - name: Download Windows portable package
        uses: actions/download-artifact@v8
        with:
          name: Media-Administrator-windows-x64-portable
          path: artifacts

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: Media-Administrator-windows-x64-installer
          path: artifacts

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "${{ needs.build_windows.outputs.release_tag }}"
          $title = "${{ needs.build_windows.outputs.release_title }}"
          $assets = @(Get-ChildItem -Path artifacts -Recurse -File | Select-Object -ExpandProperty FullName)

          if ($assets.Count -eq 0) {
            throw "No release assets found."
          }

          if (gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null) {
            gh release upload $tag @assets --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag @assets --repo $env:GITHUB_REPOSITORY --title $title --notes "Windows x64 build for $tag." --target $env:GITHUB_SHA
          }
